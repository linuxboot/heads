version: 2.1

commands:
  build_board:
    parameters:
      arch:
        type: string
      target:
        type: string
      subcommand:
        type: string
    steps:
      - run:
          name: Make Board (console logs not contiguous because multiple CPUs used to build under CircleCI, see logs in artifacts or Output build failing logs below in case of failed step)
          command: |
            echo "Sourcing /devenv.sh since docker entrypoint doesn't do it as expected"
            source /devenv.sh
            rm -rf build/<< parameters.arch >>/log/*
            #Pass AVAILABLE_MEM_GB=8 to respect CircleCI free tier RAM assignation, which otherwise randomly fails. See Makefile calculations.
            # Without AVAILABLE_MEM_GB=8: CircleCI passes '-j36 --load-average=54'
            # With AVAILABLE_MEM_GB=8: CircleCI passes '-j8 --load-average=12'
            make V=1 BOARD=<< parameters.target >> << parameters.subcommand >> AVAILABLE_MEM_GB=8  | ts || touch ./tmpDir/failed_build
          no_output_timeout: 3h
      - run:
          name: Output hashes
          command: |
            cat build/<< parameters.arch >>/<< parameters.target >>/hashes.txt || echo "No hashes.txt for this build step..."
      - run:
          name: Output sizes
          command: |
            cat build/<< parameters.arch >>/<< parameters.target >>/sizes.txt || echo "No sizes.txt for this build step..."
      - run:
          name: Archiving build logs.
          command: |
            tar zcvf build/<< parameters.arch >>/<< parameters.target >>/logs.tar.gz $(find build/ -name "*.log")
      - run:
          name: Output build failing logs
          command: |
            if [[ -f ./tmpDir/failed_build ]]; then
              find "./build/<< parameters.arch >>/" -name "*.log" -type f -mmin -1 -exec tail -n +1 '{}' +
              exit 1
            else
              echo "Step hasn't failed. Continuing with next step..."
            fi
      - store_artifacts:
          path: build/<< parameters.arch >>/<< parameters.target >>

jobs:
  prep_env:
    docker:
      # Docker image: tlaurion/heads-dev-env:v0.2.9
      - image: tlaurion/heads-dev-env@sha256:96f8f91c6464305c4a990d59f9ef93910c16c7fd0501a46b43b34a4600a368de
    resource_class: large
    working_directory: ~/heads
    steps:
      - checkout
      - run:
          name: git reset
          command: |
            git reset --hard "$CIRCLE_SHA1"
      - run:
          name: Make tmp dir
          command: |
            mkdir ./tmpDir
      - run:
          name: Creating all modules and patches digest (All modules cache digest)
          command: |
            find .circleci/config.yml ./Makefile ./flake.lock ./patches/ ./modules/ -type f | sort -h |xargs sha256sum > ./tmpDir/all_modules_and_patches.sha256sums
      - run:
          name: Creating coreboot (and associated patches) and musl-cross-make modules digest (musl-cross-make and coreboot cache digest)
          command: |
            find .circleci/config.yml ./flake.lock ./modules/coreboot ./modules/musl-cross-make* ./patches/coreboot* -type f | sort -h | xargs sha256sum > ./tmpDir/coreboot_musl-cross-make.sha256sums
      - run:
          name: Creating musl-cross-make and musl-cross-make patches digest (musl-cross-make cache digest)
          command: |
            find ./flake.lock modules/musl-cross-make* -type f | sort -h | xargs sha256sum > ./tmpDir/musl-cross-make.sha256sums
      - run:
          name: Download and neuter xx20 ME (keep generated GBE and extracted IFD in tree)
          command: |
            ./blobs/xx20/download_parse_me.sh
      - run:
          name: Download Optiplex 7010/9010 blobs
          command: |
            ./blobs/xx30/optiplex_7010_9010.sh ./blobs/xx30
      # me_cleaner.py present under heads blobs/utils/me_cleaner dir comes from https://github.com/corna/me_cleaner/blob/43612a630c79f3bc6f2653bfe90dfe0b7b137e08/me_cleaner.py
      - run:
          name: Download and neuter xx30 ME (keep generated GBE and extracted IFD in tree)
          command: |
            ./blobs/xx30/download_clean_me_manually.sh -m $(readlink -f ./blobs/utils/me_cleaner/me_cleaner.py)
      - run:
          name: Download, neuter and deguard xx80 ME (keep generated GBE and extracted IFD in tree)
          command: |
            ./blobs/xx80/t480_download_clean_deguard_me_pad_tb.sh -m $(readlink -f ./blobs/utils/me_cleaner/me_cleaner.py) ./blobs/xx80/
            ./blobs/xx80/t480s_download_clean_deguard_me_pad_tb.sh -m $(readlink -f ./blobs/utils/me_cleaner/me_cleaner.py) ./blobs/xx80/
      - run:
          name: Download and extract t530 vbios roms for dgpu boards
          command: |
            echo skipping for now
            exit 0
            ./blobs/xx30/vbios_t530.sh
      - run:
          name: Download and extract w530 vbios roms for dgpu boards
          command: |
            echo skipping for now
            exit 0
            ./blobs/xx30/vbios_w530.sh
      - persist_to_workspace:
          root: ~/heads
          paths:
            - .

  x86-prep:
    docker:
      # Docker image: tlaurion/heads-dev-env:v0.2.9
      - image: tlaurion/heads-dev-env@sha256:96f8f91c6464305c4a990d59f9ef93910c16c7fd0501a46b43b34a4600a368de
    resource_class: large
    working_directory: ~/heads
    steps:
      - attach_workspace:
          at: ~/heads
      - restore_cache:
          # First matched/found key wins and following keys are not tried
          keys:
            - nix-docker-heads-modules-x86-{{ checksum "./tmpDir/all_modules_and_patches.sha256sums" }}{{ .Environment.CACHE_VERSION }}
            - nix-docker-heads-coreboot-musl-cross-make-x86-{{ checksum "./tmpDir/coreboot_musl-cross-make.sha256sums" }}{{ .Environment.CACHE_VERSION }}
            - nix-docker-heads-musl-cross-make-x86-{{ checksum "./tmpDir/musl-cross-make.sha256sums" }}{{ .Environment.CACHE_VERSION }}
      - persist_to_workspace:
          workspace: x86
          root: ~/heads
          paths:
            - packages/x86
            - build/x86
            - crossgcc/x86
            - install/x86

  ppc64-prep:
    docker:
      # Docker image: tlaurion/heads-dev-env:v0.2.9
      - image: tlaurion/heads-dev-env@sha256:96f8f91c6464305c4a990d59f9ef93910c16c7fd0501a46b43b34a4600a368de
    resource_class: large
    working_directory: ~/heads
    steps:
      - attach_workspace:
          at: ~/heads
      - restore_cache:
          # First matched/found key wins and following keys are not tried
          keys:
            - nix-docker-heads-modules-ppc64-{{ checksum "./tmpDir/all_modules_and_patches.sha256sums" }}{{ .Environment.CACHE_VERSION }}
            - nix-docker-heads-coreboot-musl-cross-make-ppc64-{{ checksum "./tmpDir/coreboot_musl-cross-make.sha256sums" }}{{ .Environment.CACHE_VERSION }}
            - nix-docker-heads-musl-cross-make-ppc64-{{ checksum "./tmpDir/musl-cross-make.sha256sums" }}{{ .Environment.CACHE_VERSION }}
      - persist_to_workspace:
          workspace: ppc64
          root: ~/heads
          paths:
            - packages/ppc64
            - build/ppc64
            - crossgcc/ppc64
            - install/ppc64

  build_and_persist:
    docker:
      # Docker image: tlaurion/heads-dev-env:v0.2.9
      - image: tlaurion/heads-dev-env@sha256:96f8f91c6464305c4a990d59f9ef93910c16c7fd0501a46b43b34a4600a368de
    resource_class: large
    working_directory: ~/heads
    parameters:
      arch:
        type: string
        default: x86
      workspace:
        type: string
        default: x86
      target:
        type: string
      subcommand:
        type: string
    steps:
      - attach_workspace:
          at: ~/heads
          workspace: << parameters.workspace >>
      - build_board:
          arch: << parameters.arch >>
          target: << parameters.target >>
          subcommand: << parameters.subcommand >>
      - persist_to_workspace:
          workspace: << parameters.workspace >>
          root: ~/heads
          paths:
            - packages/<< parameters.arch >>
            - build/<< parameters.arch >>
            - crossgcc/<< parameters.arch >>
            - install/<< parameters.arch >>

  build:
    docker:
      # Docker image: tlaurion/heads-dev-env:v0.2.9
      - image: tlaurion/heads-dev-env@sha256:96f8f91c6464305c4a990d59f9ef93910c16c7fd0501a46b43b34a4600a368de
    resource_class: large
    working_directory: ~/heads
    parameters:
      arch:
        type: string
        default: x86
      workspace:
        type: string
        default: x86
      target:
        type: string
      subcommand:
        type: string
    steps:
      - attach_workspace:
          at: ~/heads
          workspace: << parameters.workspace >>
      - build_board:
          arch: <<parameters.arch>>
          target: <<parameters.target>>
          subcommand: <<parameters.subcommand>>

  save_cache_x86:
    docker:
      # Docker image: tlaurion/heads-dev-env:v0.2.9
      - image: tlaurion/heads-dev-env@sha256:96f8f91c6464305c4a990d59f9ef93910c16c7fd0501a46b43b34a4600a368de
    resource_class: large
    working_directory: ~/heads
    steps:
      - attach_workspace:
          at: ~/heads
          workspace: x86
      - save_cache:
          # Generate cache for the same musl-cross-make module definition if hash is not previously existing
          # CircleCI removed their wildcard support, so we have to list precise versions to cache in directory names
          key: nix-docker-heads-musl-cross-make-x86-{{ checksum "./tmpDir/musl-cross-make.sha256sums" }}{{ .Environment.CACHE_VERSION }}
          paths:
            - build/x86/musl-cross-make-fd6be58297ee21fcba89216ccd0d4aca1e3f1c5c
            - crossgcc/x86
            - packages/x86
      - save_cache:
          # Generate cache for the same coreboot and musl-cross-make modules definition if hash is not previously existing
          # CircleCI removed their wildcard support, so we have to list precise versions to cache in directory names
          key: nix-docker-heads-coreboot-musl-cross-make-x86-{{ checksum "./tmpDir/coreboot_musl-cross-make.sha256sums" }}{{ .Environment.CACHE_VERSION }}
          paths:
            - build/x86/coreboot-4.11
            - build/x86/coreboot-24.02.01
            - build/x86/coreboot-25.09
            - build/x86/coreboot-dasharo_v56
            - build/x86/coreboot-dasharo_nv4x
            - build/x86/coreboot-dasharo_msi_z790
            - build/x86/coreboot-dasharo_msi_z690
            - build/x86/coreboot-purism
            - build/x86/musl-cross-make-fd6be58297ee21fcba89216ccd0d4aca1e3f1c5c
            - crossgcc/x86
            - packages/x86
      - save_cache:
          # Generate cache for the exact same modules definitions if hash is not previously existing
          key: nix-docker-heads-modules-x86-{{ checksum "./tmpDir/all_modules_and_patches.sha256sums" }}{{ .Environment.CACHE_VERSION }}
          paths:
            - build/x86
            - install/x86
            - crossgcc/x86
            - packages/x86



  save_cache_ppc64:
    docker:
      # Docker image: tlaurion/heads-dev-env:v0.2.9
      - image: tlaurion/heads-dev-env@sha256:96f8f91c6464305c4a990d59f9ef93910c16c7fd0501a46b43b34a4600a368de
    resource_class: large
    working_directory: ~/heads
    steps:
      - attach_workspace:
          at: ~/heads
          workspace: ppc64
      - save_cache:
          # Generate cache for the same musl-cross-make module definition if hash is not previously existing
          # CircleCI removed their wildcard support, so we have to list precise versions to cache in directory names
          key: nix-docker-heads-musl-cross-make-ppc64-{{ checksum "./tmpDir/musl-cross-make.sha256sums" }}{{ .Environment.CACHE_VERSION }}
          paths:
            - build/ppc64/musl-cross-make-fd6be58297ee21fcba89216ccd0d4aca1e3f1c5c
            - crossgcc/ppc64
            - packages/ppc64
      - save_cache:
          # Generate cache for the same coreboot and musl-cross-make modules definition if hash is not previously existing
          # CircleCI removed their wildcard support, so we have to list precise versions to cache in directory names
          key: nix-docker-heads-coreboot-musl-cross-make-ppc64-{{ checksum "./tmpDir/coreboot_musl-cross-make.sha256sums" }}{{ .Environment.CACHE_VERSION }}
          paths:
            - build/ppc64/coreboot-talos_2
            - build/ppc64/musl-cross-make-fd6be58297ee21fcba89216ccd0d4aca1e3f1c5c
            - crossgcc/ppc64
            - packages/ppc64
      - save_cache:
          # Generate cache for the exact same modules definitions if hash is not previously existing
          key: nix-docker-heads-modules-ppc64-{{ checksum "./tmpDir/all_modules_and_patches.sha256sums" }}{{ .Environment.CACHE_VERSION }}
          paths:
            - build/ppc64
            - install/ppc64
            - crossgcc/ppc64
            - packages/ppc64

workflows:
  version: 2
  build_and_test:
    max_auto_reruns: 3
    jobs:
      - prep_env
      - x86-prep:
          requires:
            - prep_env
      - ppc64-prep:
          requires:
            - prep_env

      # This step builds musl-cross-make for x86 architecture, which will be used by subsequent x86 board builds
      - build_and_persist:
          name: x86-musl-cross-make
          target: EOL_t480-hotp-maximized
          subcommand: "musl-cross-make"
          requires:
            - x86-prep

      # This step builds musl-cross-make for ppc64 architecture, which will be used by subsequent ppc64 board builds
      - build_and_persist:
          name: ppc64-musl-cross-make
          arch: ppc64
          workspace: ppc64
          target: UNTESTED_talos-2
          subcommand: "musl-cross-make"
          requires:
            - ppc64-prep

      # Below, sequentially build one board for each coreboot version.
      # The last board in the sequence is the dependency for the parallel boards built at the end, and also save_cache.

      # coreboot 24.02.01
      - build_and_persist:
          name: novacustom-nv4x_adl
          target: novacustom-nv4x_adl
          subcommand: ""
          requires:
            - x86-musl-cross-make

      # coreboot purism: builds 24.02.01 toolchain, all librem boards share it
      - build_and_persist:
          name: librem_14
          target: librem_14
          subcommand: ""
          requires:
            - x86-musl-cross-make

      # t480 is based on 25.09 coreboot release, not sharing any buildstack from now, depend on muscl-cross cache
      - build_and_persist:
          name: EOL_t480-hotp-maximized
          target: EOL_t480-hotp-maximized
          subcommand: ""
          requires:
            - x86-musl-cross-make

      # coreboot talos_2
      - build_and_persist:
          name: UNTESTED_talos-2
          arch: ppc64
          workspace: ppc64
          target: UNTESTED_talos-2
          subcommand: ""
          requires:
            - ppc64-musl-cross-make

      # coreboot 4.11
      - build_and_persist:
          name: EOL_librem_l1um
          target: EOL_librem_l1um
          subcommand: ""
          requires:
            - x86-musl-cross-make

      # dasharo_msi: builds its own toolchain, msi_z690a_ddr5 depends on it
      - build_and_persist:
          name: UNTESTED_msi_z690a_ddr4
          target: UNTESTED_msi_z690a_ddr4
          subcommand: ""
          requires:
            - x86-musl-cross-make

      # Dasharo forks: each fork builds its own toolchain (FSP header incompatibilities)
      # - novacustom-nv4x_adl: builds dasharo_nv4x toolchain, nitropad-ns50 reuses it
      # - novacustom-v560tu: builds dasharo_v56 toolchain, v540tu reuses it
      # - UNTESTED_msi_z690a_ddr4: builds dasharo_msi_z690 toolchain, msi_z690a_ddr5 reuses it
      # - UNTESTED_msi_z790p_ddr4: builds dasharo_msi_z790 toolchain, msi_z790p_ddr5 reuses it

      # x86: combines x86 workspaces and saves x86 cache
      # Workspaces combined: x86-musl-cross-make, novacustom-nv4x_adl, librem_14,
      #                      EOL_t480-hotp-maximized, EOL_librem_l1um, UNTESTED_msi_z690a_ddr4
      - save_cache_x86:
          requires:
            - x86-musl-cross-make
            - novacustom-nv4x_adl
            - librem_14
            - EOL_t480-hotp-maximized
            - EOL_librem_l1um
            - UNTESTED_msi_z690a_ddr4

      # ppc64: combines ppc64 workspaces and saves ppc64 cache
      # Workspaces combined: ppc64-musl-cross-make, UNTESTED_talos-2
      - save_cache_ppc64:
          requires:
            - UNTESTED_talos-2

      # Those onboarding new boards should add their entries below.
      # coreboot 25.09 boards
      - build:
          name: EOL_x220-hotp-maximized
          target: EOL_x220-hotp-maximized
          subcommand: ""
          requires:
            - EOL_t480-hotp-maximized

      - build:
          name: EOL_x220-maximized
          target: EOL_x220-maximized
          subcommand: ""
          requires:
            - EOL_t480-hotp-maximized

      - build:
          name: EOL_t420-hotp-maximized
          target: EOL_t420-hotp-maximized
          subcommand: ""
          requires:
            - EOL_t480-hotp-maximized

      - build:
